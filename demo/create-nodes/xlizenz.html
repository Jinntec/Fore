<!DOCTYPE HTML>
<html>
<head>
    <meta content="text/html; charset=UTF-8" http-equiv="Content-Type">
    <meta content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes" name="viewport">
    <title></title>
    <link href="../../resources/fore.css" rel="stylesheet">
    <link href="../../resources/demo.css" rel="stylesheet">
    <link href="../../resources/vars.css" rel="stylesheet">
    <link href="../../resources/toastify.css" rel="stylesheet">
    <link href="default.css" rel="stylesheet">

    <script type="module" src="../demo.js"></script>
</head>
<body>
<div class="wrapper">
    <fx-fore create-nodes="create-nodes" id="fx-invoice">
        <fx-var name="invoice" value="instance('default')"></fx-var>
        <fx-model>
            <fx-instance src="data/invoice-ubl.xml"></fx-instance>
            <fx-instance id="vars">
                <data></data>
            </fx-instance>
            <fx-submission id="s-save" method="post" replace="download" target="invoice.xml" url="#echo" validate="false">
                <fx-message event="submit-error">Saving failed</fx-message>
            </fx-submission>
            <fx-submission id="s-load" method="get" replace="instance" url="data/invoice-ubl-new.xml"></fx-submission>
            <fx-bind ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='XLizenz']/cbc:Value"
                     required="true()"></fx-bind>
            <fx-bind ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='Type']/cbc:Value"
                     required="true()"></fx-bind>
            <fx-bind ref="*/cbc:IssueDate" required="true()"></fx-bind>
            <fx-bind ref="*/cac:AccountingSupplierParty/cac:Party/cac:PartyName/cbc:Name" required="true()"></fx-bind>
            <fx-bind ref="*/cac:AccountingSupplierParty/cac:Party/cbc:ID" required="true()"></fx-bind>
            <fx-bind
                    ref="*/cac:AccountingSupplierParty/cac:Party/instance()/*/cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='EntityRole']/cbc:Value"
                    required="true()"></fx-bind>
            <fx-bind ref="*/cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='RightType']/cbc:Value"
                     required="true()"></fx-bind>
            <fx-bind ref="cac:InvoiceLine/cac:DocumentReference/cac:Attachment/cac:ExternalReference/cbc:URI"
                     required="true()"></fx-bind>
        </fx-model>
        <header class="app-bar">
            <button aria-label="Open navigation" class="nav-toggle" popovertarget="site-nav">☰
            </button>
            <span class="app-title">Invoice Editor</span>
            <div class="app-actions">
                <fx-trigger class="save-button">
                    <button>New</button>
                    <fx-send submission="s-load"></fx-send>
                </fx-trigger>
                <fx-trigger class="save-button">
                    <button>Save</button>
                    <fx-send submission="s-save"></fx-send>
                </fx-trigger>
            </div>
        </header>
        <div class="layout">
            <nav id="site-nav" popover="auto">
                <ul>
                    <li><a href="#xlizenz">Softwarelizenz</a></li>
                    <li><a href="#entitaet">Entität</a></li>
                    <li><a href="#lizenz-info">Softwarelizenz-Informationen</a></li>
                    <li><a href="#nutzungsrechte">Nutzungsrechte</a></li>
                    <li><a href="#vertrag">Vertrag</a></li>
                    <li><a href="#bestellung">Bestellinformationen</a></li>
                    <li><a href="#links">Links</a></li>
                </ul>
            </nav>
            <main>
                <fx-group id="outer" ref="instance()/*" show-icon="true">
                    <section class="BG-1" id="xlizenz">
                        <header>Softwarelizenz</header>
                        <fx-repeat aria-label="Softwarelizenz" id="r-BG-1" ref="cac:InvoiceLine">
                            <template>
                                <fx-control id="BT-1"
                                            ref="cac:Item/cac:AdditionalItemProperty[cbc:Name='XLizenz']/cbc:Value"><label
                                        for="BT-1-input">Lizenz-ID</label><input id="BT-1-input" type="text"></fx-control>
                                <fx-control id="BT-2" ref="cac:Item/cac:AdditionalItemProperty[cbc:Name='Type']/cbc:Value">
                                    <label for="BT-2-input">Lizenztyp</label><select class="widget" id="BT-2-input"
                                                                                     selection="open"></select></fx-control>
                                <fx-control id="BT-4" ref="instance()/*/cbc:IssueDate"><label for="BT-4-input">Erstellungsdatum</label><input
                                        id="BT-4-input" type="date"></fx-control>
                                <fx-control id="BT-5" on-demand="true"
                                            ref="instance()/*/cac:Delivery/cbc:ActualDeliveryDate"><label for="BT-5-input">Bereitstellungsdatum</label><input
                                        id="BT-5-input" type="date"></fx-control>
                                <fx-control id="BT-6"
                                            on-demand="true"
                                            ref="cac:Item/cac:AdditionalItemProperty[cbc:Name='supplementalEntType']/cbc:Value"><label for="BT-6-input">Ergänzungstyp</label><select
                                        class="widget" id="BT-6-input" selection="open"></select></fx-control>
                                <fx-control id="BT-7"
                                            on-demand="true"
                                            ref="cac:Item/cac:AdditionalItemProperty[cbc:Name='linkedToPrimaryEntId']/cbc:Value"><label for="BT-7-input">Primär-Lizenz-ID</label><input
                                        id="BT-7-input" type="text"></fx-control>
                                <fx-control id="BT-8"
                                            on-demand="true"
                                            ref="cac:Item/cac:AdditionalItemProperty[cbc:Name='consolidatesEntIds']/cbc:Value"><label for="BT-8-input">Konsolidierte Lizenz-IDs</label><input
                                        id="BT-8-input" type="text"></fx-control>
                                <fx-trigger class="delete-btn">
                                    <button>delete</button>
                                    <fx-delete ref="."></fx-delete>
                                </fx-trigger>
                            </template>
                        </fx-repeat>
                        <fx-trigger class="add-button">
                            <button>add</button>
                            <fx-insert origin="#r-BG-1" ref="cac:InvoiceLine"></fx-insert>
                        </fx-trigger>
                    </section>
                    <section class="BG-2" id="entitaet">
                        <header>Entität</header>
                        <fx-repeat aria-label="Entität" id="r-BG-2"
                                   ref="instance()/*/cac:AccountingSupplierParty/cac:Party">
                            <template>
                                <fx-control id="BT-9" ref="cac:PartyName/cbc:Name"><label
                                        for="BT-9-input">Entitätsname</label><input id="BT-9-input" type="text">
                                </fx-control>
                                <fx-control id="BT-10" ref="cbc:ID"><label for="BT-10-input">Entitäts-ID</label><input
                                        id="BT-10-input" type="text"></fx-control>
                                <fx-control id="BT-11"
                                            ref="instance()/*/cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='EntityRole']/cbc:Value">
                                    <label for="BT-11-input">Entitätsrolle</label><select class="widget" id="BT-11-input"
                                                                                          selection="open"></select>
                                </fx-control>
                                <fx-trigger class="delete-btn">
                                    <button>delete</button>
                                    <fx-delete ref="."></fx-delete>
                                </fx-trigger>
                            </template>
                        </fx-repeat>
                        <fx-trigger class="add-button">
                            <button>add</button>
                            <fx-insert origin="#r-BG-2" ref="cac:AccountingSupplierParty/cac:Party"></fx-insert>
                        </fx-trigger>
                    </section>
                    <section class="BG-3" id="lizenz-info">
                        <header>Softwarelizenz-Informationen</header>
                        <fx-group id="BG-3" ref="cac:InvoiceLine/cac:Item">
                            <fx-control id="BT-12"
                                        on-demand="true"
                                        ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='EntitlementType']/cbc:Value"><label for="BT-12-input">Softwarelizenz-Typ</label><select
                                    class="widget" id="BT-12-input" selection="open"></select></fx-control>
                            <fx-control id="BT-13"
                                        on-demand="true"
                                        ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='isBundled']/cbc:Value"><label for="BT-13-input">Paket-Indikator</label><input
                                    id="BT-13-input" type="text"></fx-control>
                            <fx-control id="BT-14"
                                        on-demand="true"
                                        ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='Edition']/cbc:Value"><label for="BT-14-input">Edition</label><input id="BT-14-input"
                                                                                                                                                                               type="text">
                            </fx-control>
                            <fx-control id="BT-15"
                                        on-demand="true"
                                        ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='LicencePool']/cbc:Value"><label for="BT-15-input">Lizenzpool</label><input id="BT-15-input"
                                                                                                                                                                                      type="text">
                            </fx-control>
                            <fx-control id="BT-16"
                                        on-demand="true"
                                        ref="cac:InvoiceLine/cac:Item/cac:ManufacturerParty/cac:PartyName/cbc:Name"><label for="BT-16-input">Hersteller</label><input id="BT-16-input"
                                                                                                                                                                      type="text">
                            </fx-control>
                            <fx-control id="BT-17" on-demand="true"
                                        ref="cac:InvoiceLine/cac:Item/cac:SellersItemIdentification/cbc:ID"><label for="BT-17-input">Produkt-SKU</label><input id="BT-17-input"
                                                                                                                                                               type="text">
                            </fx-control>
                            <fx-control id="BT-19"
                                        on-demand="true"
                                        ref="cac:InvoiceLine/cac:Item/cac:CommodityClassification/cbc:ItemClassificationCode"><label for="BT-19-input">UNSPSC-Code</label><select
                                    class="widget" id="BT-19-input" selection="open"></select></fx-control>
                            <fx-group aria-label="Mengenangabe" id="BG-4" on-demand="true" ref="cac:InvoiceLine">
                                <fx-control id="BT-21" ref="cac:InvoiceLine/cbc:InvoicedQuantity"><label for="BT-21-input">Anzahl
                                    Lizenzen</label><input id="BT-21-input" type="number"></fx-control>
                                <fx-group aria-label="Metrik"
                                          id="BG-5"
                                          on-demand="true" ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='Metric']">
                                    <fx-control id="BT-24"
                                                ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='Metric']/cbc:Name">
                                        <label for="BT-24-input">Metrikname</label><input id="BT-24-input" type="text">
                                    </fx-control>
                                    <fx-control id="BT-25"
                                                ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='Metric']/cbc:Value">
                                        <label for="BT-25-input">Metrikbeschreibung</label><input id="BT-25-input"
                                                                                                  type="text"></fx-control>
                                </fx-group>
                            </fx-group>
                            <fx-group aria-label="Gültige Version" id="BG-6" on-demand="true"
                                      ref="cac:InvoiceLine/cac:Item">
                                <fx-control id="BT-26"
                                            ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='Version']/cbc:Value">
                                    <label for="BT-26-input">Versionsnummer</label><input id="BT-26-input" type="text">
                                </fx-control>
                                <fx-control id="BT-51"
                                            on-demand="true"
                                            ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='ColloquialVersion']/cbc:Value"><label for="BT-51-input">Kolloquialversion</label><input
                                        id="BT-51-input" type="text"></fx-control>
                                <fx-control id="BT-52"
                                            on-demand="true"
                                            ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='VersionScheme']/cbc:Value"><label for="BT-52-input">Versionsschema</label><input
                                        id="BT-52-input" type="text"></fx-control>
                            </fx-group>
                        </fx-group>
                    </section>
                    <section class="BG-7" id="nutzungsrechte">
                        <header>Nutzungsrechte</header>
                        <fx-repeat aria-label="Nutzungsrecht" id="r-BG-7" ref="cac:AdditionalItemProperty">
                            <template>
                                <fx-control id="BT-27" on-demand="true" ref="cbc:ID"><label for="BT-27-input">Nutzungsrecht-ID</label><input
                                        id="BT-27-input" type="text"></fx-control>
                                <fx-control id="BT-28" on-demand="true" ref="cbc:Name"><label for="BT-28-input">Nutzungsrechtname</label><input
                                        id="BT-28-input" type="text"></fx-control>
                                <fx-control id="BT-28-newcode"
                                            ref="instance()/*/cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty[cbc:Name='RightType']/cbc:Value">
                                    <label for="BT-28-newcode-input">Nutzungsrechttyp</label><select
                                        class="widget" id="BT-28-newcode-input" selection="open"></select></fx-control>
                                <fx-control id="BT-30" on-demand="true" ref="cbc:Value"><label for="BT-30-input">Nutzungsrecht
                                    gültig</label><input id="BT-30-input" type="text"></fx-control>
                                <fx-group aria-label="Zeitliche Befristung" id="BG-9" on-demand="true"
                                          ref="cac:UsabilityPeriod">
                                    <fx-control id="BT-35" ref="cbc:StartDate"><label
                                            for="BT-35-input">Startdatum</label><input id="BT-35-input" type="date">
                                    </fx-control>
                                    <fx-control id="BT-36" ref="cbc:EndDate"><label for="BT-36-input">Enddatum</label><input
                                            id="BT-36-input" type="date"></fx-control>
                                </fx-group>
                                <fx-trigger class="delete-btn">
                                    <button>delete</button>
                                    <fx-delete ref="."></fx-delete>
                                </fx-trigger>
                            </template>
                        </fx-repeat>
                        <fx-trigger class="add-button">
                            <button>add</button>
                            <fx-insert origin="#r-BG-7"
                                       ref="cac:InvoiceLine/cac:Item/cac:AdditionalItemProperty"></fx-insert>
                        </fx-trigger>
                    </section>
                    <section class="BG-10" id="vertrag">
                        <header>Vertrag</header>
                        <fx-group id="BG-10" ref="cac:ContractDocumentReference">
                            <fx-control id="BT-37" on-demand="true" ref="cac:ContractDocumentReference/cbc:ID"><label
                                    for="BT-37-input">Rahmenvertragsnummer</label><input id="BT-37-input" type="text">
                            </fx-control>
                            <fx-control id="BT-38" on-demand="true" ref="cac:ContractDocumentReference/cbc:ContractType">
                                <label for="BT-38-input">Vertragstyp</label><select class="widget" id="BT-38-input"
                                                                                    selection="open"></select></fx-control>
                            <fx-control id="BT-39" on-demand="true"
                                        ref="cac:ContractDocumentReference/cbc:DocumentDescription"><label for="BT-39-input">Vertragsname</label><input
                                    id="BT-39-input" type="text"></fx-control>
                            <fx-control id="BT-40" on-demand="true" ref="cac:ContractDocumentReference/cbc:UUID"><label
                                    for="BT-40-input">Vertragsnummer</label><input id="BT-40-input" type="text">
                            </fx-control>
                            <fx-control id="BT-41" on-demand="true"
                                        ref="cac:ContractDocumentReference/cac:ValidityPeriod/cbc:StartDate"><label for="BT-41-input">Vertragsbeginn</label><input
                                    id="BT-41-input" type="date"></fx-control>
                            <fx-control id="BT-42" on-demand="true"
                                        ref="cac:ContractDocumentReference/cac:ValidityPeriod/cbc:EndDate"><label for="BT-42-input">Vertragsende</label><input
                                    id="BT-42-input" type="date"></fx-control>
                        </fx-group>
                    </section>
                    <section class="BG-11" id="bestellung">
                        <header>Bestellinformationen</header>
                        <fx-group id="BG-11" ref=".">
                            <fx-control id="BT-3" on-demand="true" ref="cac:OrderReference/cbc:IssueDate"><label
                                    for="BT-3-input">Bestelldatum</label><input id="BT-3-input" type="date"></fx-control>
                            <fx-control id="BT-43" on-demand="true" ref="cac:LegalMonetaryTotal/cbc:PrepaidAmount"><label
                                    for="BT-43-input">Gesamtkosten</label><input id="BT-43-input" type="number">
                            </fx-control>
                            <fx-control id="BT-44" on-demand="true" ref="cac:InvoiceLine/cac:Price/cbc:PriceAmount"><label
                                    for="BT-44-input">Stückkosten</label><input id="BT-44-input" type="number"></fx-control>
                            <fx-control id="BT-45" on-demand="true" ref="cbc:DocumentCurrencyCode"><label for="BT-45-input">Währung</label><select
                                    class="widget" id="BT-45-input" selection="open"></select></fx-control>
                        </fx-group>
                    </section>
                    <section class="BG-12" id="links">
                        <header>Links</header>
                        <fx-repeat aria-label="Link" id="r-BG-12" ref="cac:DocumentReference">
                            <template>
                                <fx-control id="BT-46" ref="cac:Attachment/cac:ExternalReference/cbc:URI"><label
                                        for="BT-46-input">URL</label><input id="BT-46-input" type="text"></fx-control>
                                <fx-control id="BT-47" on-demand="true" ref="cbc:ID"><label for="BT-47-input">Link-Content-ID</label><input
                                        id="BT-47-input" type="text"></fx-control>
                                <fx-control id="BT-48" on-demand="true" ref="cbc:DocumentType"><label for="BT-48-input">Link-Relation</label><input
                                        id="BT-48-input" type="text"></fx-control>
                                <fx-control id="BT-49" on-demand="true"
                                            ref="cac:Attachment/cbc:EmbeddedDocumentBinaryObject/@mimeCode"><label for="BT-49-input">Link-Content-Referenz-ID</label><input
                                        id="BT-49-input" type="text"></fx-control>
                                <fx-control id="BT-50" on-demand="true" ref="cbc:DocumentDescription"><label
                                        for="BT-50-input">Link-Inhalt</label><input id="BT-50-input" type="text">
                                </fx-control>
                                <fx-trigger class="delete-btn">
                                    <button>delete</button>
                                    <fx-delete ref="."></fx-delete>
                                </fx-trigger>
                            </template>
                        </fx-repeat>
                        <fx-trigger class="add-button">
                            <button>add</button>
                            <fx-insert origin="#r-BG-12" ref="cac:InvoiceLine/cac:DocumentReference"></fx-insert>
                        </fx-trigger>
                    </section>
                </fx-group>
            </main>
        </div>
    </fx-fore>
</div>
</body>
</html>
