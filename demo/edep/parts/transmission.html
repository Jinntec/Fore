<details id="transmission" class="group-6">
    <summary>
        <h3>Transmission</h3>
        
    </summary>

    <!-- 12c) Überlieferung -->
    <fx-repeat
        class="nested-repeat"
        id="r-transmission"
        ref="listBibl[@type='transmission']/bibl">
        <template>
            <div>
                <div class="output">
                    <label>
                        Sigle
                    </label
                    >
                    <div>
                        <fx-trigger>
                            <iron-icon
                                class="widget"
                                icon="icons:content-copy"></iron-icon>
                            <fx-call function="clipboard(@corresp)"></fx-call>
                        </fx-trigger>
                    </div>
                    
                </div>
                <fx-control create="create" ref="@corresp" update-event="change">
                    <label>
                        Reference
                    </label>
                    <zotero-autocomplete
                        class="widget"
                        debounce="250"
                        endpoint="{instance('vars')/appdir}/api/zotero/items/suggest"
                        limit="8"
                        minlength="2"
                        wait-ready="true">
                    </zotero-autocomplete>
                </fx-control>
                <fx-control ref="citedRange">
                    <label>
                        Cited range
                    </label>
                </fx-control>

                <div>
                    <fx-control as="node" ref="note" update-event="leave">
                        <label>
                            Notes
                        </label>
                        <edep-xml-editor
                            base-url="${app}"
                            class="widget"
                            data-template="lib:parse-params"
                            placeholder="[Inline text/markup or sequence of paragraphs]"
                            schema-root="note">
                        </edep-xml-editor>
                    </fx-control>
                </div>
            </div>
            <fx-trigger>
                <iron-icon
                    icon="remove-circle-outline"
                    title="Überlieferung löschen"></iron-icon>
                <fx-delete ref="."></fx-delete>
                <fx-refresh control="r-transmission"></fx-refresh>
            </fx-trigger>
        </template>
    </fx-repeat>
    <fx-trigger class="add" title="Überlieferung hinzufügen">
        <iron-icon
            icon="add-circle-outline"
            title="Überlieferung hinzufügen"></iron-icon>
        <fx-insert
            context="listBibl[@type='transmission']"
            ref="bibl"
            origin="instance('templates')//bibl"></fx-insert>
        <fx-refresh control="r-transmission"></fx-refresh>
    </fx-trigger>
</details>
