<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, minimum-scale=1, initial-scale=1, user-scalable=yes" name="viewport"/>

    <title>fx-dialog</title>

    <link href="../../resources/fore.css" rel="stylesheet">

    <style>
        fx-control {
            display: block;
            margin-top: 3rem;
        }

        label {
            display: block;
            white-space: pre-wrap;
        }

        #dialog2 {
            width: 600px;
            height: 500px;
            max-width: 90%;
            max-height: 90%;
            background: orange;
        }

        fx-control {
            width: 100%;
        }
    </style>
</head>
<body>
<div class="wrapper">
    <h1>fx-dialog</h1>

    <p><code>fx-dialog</code> is <strong>deprecated</strong> — use the native HTML
        <code>&lt;dialog&gt;</code> element instead, as shown below. It already provides a focus
        trap, <code>aria-modal</code>, and Escape-to-close for free; <code>fx-show</code>/
        <code>fx-hide</code> work against it unchanged. See also <a href="../dialog.html">dialog.html</a>.</p>

    <fx-fore>
        <fx-model>
            <fx-instance>
                <data>
                    <foo>bar</foo>
                </data>
            </fx-instance>
        </fx-model>
        <demo-snippet>
            <template>

                <fx-trigger>
                    <button>open dialog 1</button>
                    <fx-show dialog="dialog1"></fx-show>
                </fx-trigger>
                <fx-trigger>
                    <button>open dialog 2</button>
                    <fx-show dialog="dialog2"></fx-show>
                </fx-trigger>

                <fx-control ref="foo">
                    <label>just foo not to be clickable when dialog is open</label>
                </fx-control>

                <dialog id="dialog1">
                    <div class="dialog-content">
                        <fx-trigger class="close-dialog">
                            <a href="#" autofocus>&times;</a>
                            <fx-hide dialog="dialog1"></fx-hide>
                        </fx-trigger>
                        <h3>Here's some dialog content</h3>
                        <p>....some more....</p>
                        <fx-trigger class="action">
                            <button>close</button>
                            <fx-hide dialog="dialog1"></fx-hide>
                        </fx-trigger>
                    </div>
                </dialog>

                <dialog id="dialog2">
                    <div class="dialog-content">
                        <h1>Custom size and background</h1>
                        <p>....some more content....</p>
                        <fx-trigger class="action">
                            <button>close</button>
                            <fx-hide dialog="dialog2"></fx-hide>
                        </fx-trigger>
                    </div>
                </dialog>
            </template>
        </demo-snippet>
    </fx-fore>

</div>
<script type="module" src="../demo.js"></script>
</body>
</html>
