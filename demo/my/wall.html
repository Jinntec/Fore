<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wall of Media</title>

    <style>
        :root{
            --gap: 10px;
            --ui-bg: rgba(255,255,255,.9);
            --ui-border: 1px solid rgba(0,0,0,.12);
            --focus: 2px solid rgba(0,0,0,.55);

            --tile-radius: 10px;
            --tile-shadow: 0 2px 8px rgba(0,0,0,.10);
            --tile-shadow-hover: 0 6px 18px rgba(0,0,0,.18);
        }

        body{
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            background: #fafafa;
            color: #111;
        }

        /* Chrome blocks file input programmatic click if display:none */
        .file-input{
            position: fixed;
            left: -9999px;
            top: 0;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
        }

        fx-fore{ display:block !important; visibility:visible !important; }

        .topbar{
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
            gap: 12px;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: var(--ui-bg);
            backdrop-filter: blur(10px);
            border-bottom: var(--ui-border);
        }

        .topbar__left{
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .btn{
            appearance: none;
            border: var(--ui-border);
            border-radius: 10px;
            background: #fff;
            padding: 10px 12px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn:focus-visible{ outline: var(--focus); outline-offset: 2px; }

        .hint{
            font-size: .9rem;
            opacity: .75;
            line-height: 1.2;
            max-width: 92ch;
        }

        .stats{
            font-size: .95rem;
            opacity: .85;
            white-space: nowrap;
        }

        .debugline{
            max-width: 1400px;
            margin: 0 auto;
            padding: 10px 16px 0 16px;
            opacity: .8;
            font-size: .95rem;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .grid{
            padding: 16px;
            max-width: 1400px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: var(--gap);
        }

        @media (max-width: 900px){
            .grid{ grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
        }
        @media (max-width: 600px){
            .grid{ grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
            .topbar{ padding: 10px 12px; }
        }

        /* Tiles */
        .tile{
            border: 1px solid rgba(0,0,0,.12);
            border-radius: var(--tile-radius);
            overflow: hidden;
            aspect-ratio: 1;
            position: relative;
            box-shadow: var(--tile-shadow);
            background: #fff;
            user-select: none;
            cursor: pointer;
        }
        .tile:hover{ box-shadow: var(--tile-shadow-hover); }

        .thumb{
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* Show/hide based on kind using data attribute (no {if()} needed) */
        .tile[data-kind="image"] .thumb.video { display: none; }
        .tile[data-kind="image"] .badge-play { display: none; }

        .tile[data-kind="video"] .thumb.image { display: none; }

        .badge-play{
            position: absolute;
            top: 10px;
            right: 10px;
            width: 30px;
            height: 30px;
            display: grid;
            place-items: center;
            border-radius: 999px;
            background: rgba(0,0,0,.55);
            color: #fff;
            font-weight: 800;
            font-size: .9rem;
        }

        .meta{
            position: absolute;
            left: 8px;
            right: 8px;
            bottom: 8px;
            padding: 6px 8px;
            border-radius: 8px;
            background: rgba(0,0,0,.55);
            color: #fff;
            font-size: .85rem;
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: space-between;
        }

        .name{
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
        }

        .kind{
            font-size: .75rem;
            padding: 2px 6px;
            border-radius: 999px;
            background: rgba(255,255,255,.18);
            white-space: nowrap;
            flex: none;
        }

        .is-selected{
            outline: 3px solid rgba(0,0,0,.55);
            outline-offset: -3px;
        }
    </style>
</head>

<body>

<!-- Browser pickers -->
<input class="file-input" id="dirPicker" type="file" webkitdirectory multiple />
<input class="file-input" id="filePicker" type="file" multiple accept="image/*,video/*" />

<!-- Enable template expressions (both spellings; one will match your build) -->
<fx-fore id="wall" template-expressions="true" template-expression="true">
    <fx-model>
        <fx-instance id="files"><files/></fx-instance>
    </fx-model>

    <header class="topbar">
        <div class="topbar__left">
            <fx-trigger>
                <button class="btn" type="button">Pick folder…</button>
                <fx-action><fx-message>pick-dir</fx-message></fx-action>
            </fx-trigger>

            <fx-trigger>
                <button class="btn" type="button">Pick files…</button>
                <fx-action><fx-message>pick-files</fx-message></fx-action>
            </fx-trigger>

            <fx-trigger>
                <button class="btn" type="button">Clear</button>
                <fx-action><fx-message>clear</fx-message></fx-action>
            </fx-trigger>

            <span class="hint">
        Declarative Fore + external <code>wall.js</code> bridge. Uses <code>data-kind</code> + CSS (no conditional template expressions in class attributes).
      </span>
        </div>

        <div class="stats">
            <fx-output ref="count(instance('files')//file)"/> items
        </div>
    </header>

    <div class="debugline">
        <span>count: <strong><fx-output ref="count(instance('files')//file)"/></strong></span>
        <span>first: <strong><fx-output ref="(instance('files')//file[1]/name, '')[1]"/></strong></span>
    </div>

    <div class="grid" id="grid">
        <!-- Enable template expressions here too (both spellings) -->
        <fx-repeat id="media"
                   ref="instance('files')//file"
                   template-expressions="true"
                   template-expression="true">
            <template>
                <!-- NOTE: url/kind template placeholders must expand, otherwise you'll see a 404 for the literal {url} -->
                <div class="tile" data-kind="{kind}" title="{name}">
                    <img class="thumb image" src="{url}" alt="{name}" loading="lazy">
                    <video class="thumb video" muted playsinline preload="metadata">
                        <source src="{url}" type="{type}">
                    </video>
                    <div class="badge-play">▶</div>
                    <div class="meta">
                        <span class="name">{name}</span>
                        <span class="kind">{kind}</span>
                    </div>
                </div>
            </template>
        </fx-repeat>
    </div>
</fx-fore>

<script type="module" src="./wall.js"></script>
<script type="module" src="../demo.js"></script>

</body>
</html>
