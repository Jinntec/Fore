<fx-case>
    <fx-action event="select">
        <fx-message>Activities selected</fx-message>
    </fx-action>
    <fx-action event="deselect">
        <fx-message>Activities deselected</fx-message>
    </fx-action>
    <fieldset id="appointments">
        <legend>
            <label>Termine</label>
        </legend>
        <fx-repeat id="r-ots" ref="instance('i-pat-comp')//encounter" class="">
            <template>
                <fx-output ref="./id/@value"></fx-output>
            </template>
        </fx-repeat>
    </fieldset>
</fx-case>
